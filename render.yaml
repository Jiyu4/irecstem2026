# Render Blueprint - IRECSTEM 2026
services:
  - type: web
    name: irecstem2026
    runtime: php
    plan: free
    buildCommand: ""
    startCommand: "php -S $HOST:$PORT"
    headers:
      - path: /*
        name: Security Headers
        value: |
          X-Frame-Options: SAMEORIGIN
          X-Content-Type-Options: nosniff
envVars:
  - key: PHP_VERSION
    value: "8.2"
