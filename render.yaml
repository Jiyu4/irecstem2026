# Render Blueprint - IRECSTEM 2026
# Deploy to: https://render.com

services:
  - type: web
    name: irecstem2026
    rootDir: deploy_render
    runtime: php82
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      chmod -R 755 data/ uploads/
    startCommand: php -S $HOST:$PORT
    headers:
      - path: /*
        name: Security Headers
        value: |
          X-Frame-Options: SAMEORIGIN
          X-Content-Type-Options: nosniff
          X-XSS-Protection: 1; mode=block

envVars:
  - key: PHP_VERSION
    value: "8.2"
  - key: APP_ENV
    value: production
  - key: SMTP_HOST
    value: "smtp.gmail.com"
  - key: SMTP_PORT
    value: "587"
  - key: SMTP_USERNAME
    value: "giomilitar39@gmail.com"
  - key: SMTP_PASSWORD
    value: "lzra fgxe gcge aois"
  - key: SMTP_FROM_EMAIL
    value: "giomilitar39@gmail.com"
  - key: SMTP_FROM_NAME
    value: "IRECSTEM 2026"
